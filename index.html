<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora do Lanche - Chatbot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="chatbot-container">
        <!-- Header -->
        <div class="chatbot-header">
            <h1>Hora do Lanche</h1>
            <p>Seu assistente de pedidos</p>
        </div>

        <!-- Chat Messages Area -->
        <div class="chat-messages">
            <div class="message bot-message">
                <div class="message-content">
                    Olá! Bem-vindo ao Hora do Lanche. Como posso ajudá-lo hoje?
                </div>
            </div>
            <div class="message user-message">
                <div class="message-content">
                    Qual é o cardápio?
                </div>
            </div>
            <div class="message bot-message">
                <div class="message-content">
                    Temos deliciosos sanduíches, pizzas, bebidas e sobremesas. O que te interessa?
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <form class="chat-form" id="chatForm">
                <input 
                    type="text" 
                    class="chat-input" 
                    id="messageInput"
                    placeholder="Digite sua mensagem..."
                    autocomplete="off"
                >
                <button type="submit" class="send-button">
                    <span>Enviar</span>
                </button>
            </form>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <button class="quick-btn">📋 Cardápio</button>
            <button class="quick-btn">🛒 Meu Pedido</button>
            <button class="quick-btn">📞 Contato</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
